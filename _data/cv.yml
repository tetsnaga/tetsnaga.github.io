    Experience:
      - company: Tetsuwan Scientific
        position: Visiting Member of the Technical Staff
        location: San Francisco, CA
        start_date: 2025-03
        end_date: 2025-05
        summary: Prototyped LLM- and vision-based systems for laboratory automation.
        highlights:
          - Explored NLP techniques to translate scientific intent into executable machine code, blending LLMs for context-sensitive subtasks with rules-based models for deterministic subtasks.
          - Prototyped a multimodal agent that converts labware blueprints into structured JSON by combining OCR and LLMs while preserving spatial relationships between features.
          - Designed and built a standardized computer-vision dataset for liquid-class calibration, tuning pipetting parameters to eliminate undesirable symptoms and improve experimental reproducibility.
          - Developed a YOLO labware classifier, diagnosed overfitting to deck backgrounds and lighting, and applied color jitter and rotation augmentation to enforce learning of true labware features.
          - Concluded the role early due to recurrence of a prior back injury.

      - company: USC Workshop on AI for Discovery in the Sciences
        position: Undergraduate Research Assistant
        location: Los Angeles, CA
        start_date: 2024-01
        end_date: 2024-05
        summary: Co-developed and instructed a hands-on ML curriculum for researchers across the sciences.
        highlights:
          - Developed and taught an ML curriculum for 40 PhD students and professionals using Google Colab for cloud compute and GPU access.
          - Created and augmented a custom sunrise image dataset from a GoPro time-lapse to demonstrate nonlinear phase-transition detection via the "Learning by Confusion" method.
          - Showcased a generative diffusion model, implemented a custom UNet2DModel and pipeline, explored different noise schedulers, and trained classifiers to detect generated samples.

      - company: USC School of Philosophy
        position: Undergraduate Research Assistant
        location: Los Angeles, CA
        start_date: 2022-08
        end_date: 2022-12
        summary: Research on foundational questions in the philosophy of physics.
        highlights:
          - Analyzed debates between Presentism and Eternalism in special relativity, engaging with Putnam's tenseless nature of existence and Stein's subjective becoming.
          - Investigated the EPR paradox's implications for quantum mechanics, including Bell's theorem and the violation of Bell inequalities as evidence of quantum non-locality.
          - Assessed the limitations of local hidden-variable theories and the role of empirical evidence in metaphysical discussions.

      - company: University of Hawaii Outer Galaxy Group
        position: Undergraduate Research Fellow
        location: Mānoa, HI
        start_date: 2021-05
        end_date: 2021-07
        summary: Computational astrophysics research on satellite galaxy orbits and galactic dynamics.
        highlights:
          - Modeled Antlia 2's orbit using Gaia EDR3 data, developing a stellar selection criterion based on stellar isochrones and proper-motion measurements to isolate galaxy members.
          - Applied Markov Chain Monte Carlo sampling to test whether current proper motions of Antlia 2 could account for observed outer-disc perturbations.
          - Explored effects of dark matter profiles and dynamical friction using numerical orbit integration to evaluate whether Antlia 2's proper motions met the criteria to induce outer-disc disturbances.

